spring.application.name=cloud-storage-backend
server.address=0.0.0.0
server.port=8080

spring.datasource.url=${CLOUD_STORAGE_DB_URL:jdbc:mysql://127.0.0.1:3306/cloud_storage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${CLOUD_STORAGE_DB_USERNAME:cloud_storage}
spring.datasource.password=${CLOUD_STORAGE_DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.initialization-fail-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=2048MB

storage.root=storage
app.jwt.secret=${CLOUD_STORAGE_JWT_SECRET:change-me-to-a-long-random-secret}
app.jwt.expire-hours=${CLOUD_STORAGE_JWT_EXPIRE_HOURS:168}
app.frontend-origin=${CLOUD_STORAGE_FRONTEND_ORIGIN:http://127.0.0.1:5173}
app.cors.allowed-origins=${CLOUD_STORAGE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://*:5173}
app.admin.default-username=${CLOUD_STORAGE_ADMIN_USERNAME:admin}
app.admin.default-password=${CLOUD_STORAGE_ADMIN_PASSWORD:Admin@123456}
app.admin.default-email=${CLOUD_STORAGE_ADMIN_EMAIL:admin@example.com}
